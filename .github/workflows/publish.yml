name: Publish release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  UV_LINK_MODE: copy

jobs:
  build:
    name: Build and test distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Ensure tag points at main
        run: |
          set -euo pipefail

          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.16"
          python-version: "3.13"
          enable-cache: true
          prune-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Check tag matches pyproject.toml version
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="$(uv version --short)"
          EXPECTED="v${VERSION}"

          if [ "${TAG}" != "${EXPECTED}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject.toml version ${VERSION}; expected ${EXPECTED}"
            exit 1
          fi

      - name: Install project
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run --frozen pytest

      - name: Build distributions with uv
        run: uv build --no-sources

      - name: Smoke test wheel and source distribution
        run: |
          set -euo pipefail

          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)

          test "${#wheels[@]}" -ge 1
          test "${#sdists[@]}" -eq 1

          uv run --isolated --no-project --with "${wheels[0]}" python -c "import nb_nd_viewer"
          uv run --isolated --no-project --with "${sdists[0]}" python -c "import nb_nd_viewer"

      - name: Upload built distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: testpypi
      url: https://test.pypi.org/p/notebook-nd-viewer

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-testpypi

    environment:
      name: pypi
      url: https://pypi.org/p/notebook-nd-viewer

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
